name: Release

on:
  release:
    types: [ published ]

jobs:
  discord-html-transcript-core:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: SERVER_USERNAME
          server-password: SERVER_PASSWORD
          gpg-passphrase: GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish to Maven Central
        run: mvn deploy -Ppublish -DskipTests -pl !server
        env:
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  discord-html-transcript-server:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: "linux"
            arch: "x64"
            extension: ""

          - os: windows-latest
            platform: "win32"
            arch: "x64"
            extension: ".exe"

          - os: macos-latest
            platform: "darwin"
            arch: "arm64"
            extension: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm-community'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Project Version
        shell: bash
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build Native Image
        run: mvn package -Pnative -DskipTests -am -pl server

      - name: Rename Artifact
        shell: bash
        run: |
          ARTIFACT_NAME="discord-html-transcript-server-${{ env.VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}"
          mv "server/target/discord-html-transcript-server${{ matrix.extension }}" "server/target/$ARTIFACT_NAME"
          
          ARTIFACTS="server/target/$ARTIFACT_NAME"
          
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            JAR_PATH="server/target/discord-html-transcript-server-${{ env.VERSION }}.jar"
            ARTIFACTS="$ARTIFACTS,$JAR_PATH"
          fi
          
          echo "RELEASE_ARTIFACTS=$ARTIFACTS" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_ARTIFACTS }}
