name: Release

on:
  release:
    types: [ published ]

jobs:
  discord-html-transcript-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          cache: 'maven'
          server-username: SERVER_USERNAME
          server-password: SERVER_PASSWORD
          gpg-passphrase: GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish to Maven Central
        run: mvn --batch-mode deploy -pl !server -Ppublish -DskipTests
        env:
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  discord-html-transcript-server:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            binary_name: discord-transcript-linux
            is_main_node: true
          - os: macos-latest
            binary_name: discord-transcript-macos
            is_main_node: false
          - os: windows-latest
            binary_name: discord-transcript-windows.exe
            is_main_node: false

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Required to upload to releases

    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Native Image
        run: mvn -Pnative package -pl server -am -DskipTests

      - name: Prepare Artifacts
        shell: bash
        run: |
          # Define paths
          TARGET_DIR="server/target"
          ORIGINAL_NAME="discord-html-transcript-server" 
          
          # Add .exe extension for Windows lookup
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            ORIGINAL_NAME="$ORIGINAL_NAME.exe"
          fi
          
          # Rename the native binary to a friendly name (e.g., discord-transcript-linux)
          mv "$TARGET_DIR/$ORIGINAL_NAME" "$TARGET_DIR/${{ matrix.binary_name }}"

      - name: Upload Native Binary
        uses: softprops/action-gh-release@v1
        with:
          files: server/target/${{ matrix.binary_name }}

      - name: Upload Shaded Jar
        if: matrix.is_main_node == true
        uses: softprops/action-gh-release@v1
        with:
          files: server/target/discord-html-transcript-server-*.jar
