name: Release

on:
  release:
    types: [ published ]

jobs:
  discord-html-transcript-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: SERVER_USERNAME
          server-password: SERVER_PASSWORD
          gpg-passphrase: GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish to Maven Central
        run: mvn deploy -Ppublish -DskipTests -pl core
        env:
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  discord-html-transcript-server:
    name: Build ${{ matrix.platform_name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: "Linux x64"
            suffix: "linux-x86_64"
            extension: ""

          - os: windows-latest
            platform_name: "Windows x64"
            suffix: "windows-x86_64"
            extension: ".exe"

          - os: macos-latest
            platform_name: "macOS ARM64"
            suffix: "darwin-aarch64"
            extension: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          cache: "maven"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Project Version
        shell: bash
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build Native Image
        run: mvn package -Pnative -DskipTests -am -pl server

      - name: Rename Artifact
        shell: bash
        run: |
          SOURCE="server/target/discord-html-transcript-server${{ matrix.extension }}"
          DEST="server/target/discord-html-transcript-server-${{ env.VERSION }}-${{ matrix.suffix }}${{ matrix.extension }}"
          mv "$SOURCE" "$DEST"
          echo "ARTIFACT_PATH=$DEST" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          path: server/target/discord-html-transcript-server-*
