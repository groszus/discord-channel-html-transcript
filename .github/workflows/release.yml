name: Release

on:
  release:
    types: [ published ]

jobs:
  discord-html-transcript-core:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: SERVER_USERNAME
          server-password: SERVER_PASSWORD
          gpg-passphrase: GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Publish to Maven Central
        run: mvn deploy -Ppublish -DskipTests -pl !server
        env:
          SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  discord-html-transcript-server:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: "linux"
            arch: "x64"
            extension: ""

          - os: windows-latest
            platform: "win32"
            arch: "x64"
            extension: ".exe"

          - os: macos-latest
            platform: "darwin"
            arch: "arm64"
            extension: ""

    steps:
      - uses: actions/checkout@v6

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Native Image
        run: mvn package -Pnative -DskipTests -am -pl server

      - name: Prepare Artifacts
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          
          mkdir -p artifacts
          
          mv "server/target/discord-html-transcript-server${{ matrix.extension }}" \
             "artifacts/discord-html-transcript-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.extension }}"
          
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mv "server/target/discord-html-transcript-server-${VERSION}.jar" \
               "artifacts/discord-html-transcript-${VERSION}.jar"
          fi

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
